<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        header h1 {
            color: white;
            font-size: 36px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .header-tagline {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 500;
            margin: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .username {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
            font-size: 15px;
        }

        .btn-logout {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-logout:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Notifications-specific styles */
        .notifications-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .section-title { color: #667eea; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .notification { display: flex; justify-content: space-between; gap: 20px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .notification:last-child { border-bottom: none; }
        .not-text { color: #333; }
        .not-time { color: #888; font-size: 13px; }
        .empty { text-align: center; color: #666; padding: 40px 0; }
        .btn-back { padding: 10px 15px; background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.14); border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .actions { margin-top: 20px; display: flex; gap: 12px; }
        .btn-clear { padding: 8px 12px; background: #f0f0f0; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }
        .notification-actions { display: flex; gap: 8px; }
        .notification-action-btn { padding: 4px 8px; background: #e0e0e0; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .notification-action-btn:hover { background: #d0d0d0; }
        .notification-action-btn.delete { background: #ffcccb; }
        .notification-action-btn.delete:hover { background: #ff9999; }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
                padding: 30px 20px;
            }

            .header-left h1 {
                font-size: 28px;
            }

            .header-tagline {
                font-size: 12px;
            }

            .user-info {
                width: 100%;
                justify-content: space-between;
            }

            .username {
                font-size: 14px;
            }

            .btn-logout {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 20px 15px;
            }

            .header-left h1 {
                font-size: 24px;
            }

            .user-info {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
                gap: 12px;
            }

            .username {
                font-size: 13px;
            }

            .btn-logout {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="header-left">
        <a href="/" class="btn-back">← Back to Home</a>
        <h1>🔔 Notifications</h1>
        <p class="header-tagline">Recent alerts and important updates</p>
    </div>
    <div class="user-info">
        <span class="username" th:if="${username}">
            👤 <strong th:text="${username}"></strong>
        </span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn-logout">🚪 Logout</button>
        </form>
    </div>
</header>

<div class="container">
    <div class="notifications-card">
        <div class="section-title">Recent Notifications</div>

        <div th:if="${notifications == null or #lists.isEmpty(notifications)}" class="empty">
            You have no notifications.
        </div>

        <div th:if="${notifications != null and !#lists.isEmpty(notifications)}">
            <div th:each="note, iterStat : ${notifications}" class="notification">
                <div>
                    <div class="not-text" th:text="${note.text}">Notification text</div>
                    <div class="not-time"> <span th:text="${iterStat.index == 0 ? 'Just now' : (iterStat.index == 1 ? '5m' : (iterStat.index == 2 ? '1h' : 'Yesterday'))}">time</span></div>
                </div>
                <div class="notification-actions">
                    <form th:if="${!note.read}" th:action="@{/notifications/{id}/markAsRead(id=${note.id})}" method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="notification-action-btn">Mark Read</button>
                    </form>
                    <form th:action="@{/notifications/{id}/delete(id=${note.id})}" method="post" style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="notification-action-btn delete">Delete</button>
                    </form>
                </div>
            </div>

            <div class="actions">
                <form th:action="@{/notifications/markAllRead}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn-clear">Mark all as read</button>
                </form>

                <form th:action="@{/notifications/clear}" method="post" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn-clear">Clear</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
