<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        header h1 {
            color: white;
            font-size: 36px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .btn-back {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .username {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
            font-size: 15px;
        }

        .btn-logout {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-logout:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 60px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profile-role {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 500;
        }

        .profile-body {
            padding: 40px;
        }

        .profile-section {
            margin-bottom: 30px;
        }

        .profile-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            color: #667eea;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-weight: 600;
            font-size: 14px;
        }

        .info-value {
            color: #333;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .badge-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 30px 0;
        }

        .verification-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .status-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            color: white;
        }

        .status-verified {
            background: #38ef7d;
        }

        .status-pending {
            background: #f5576c;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .header-left {
                flex-direction: column;
                width: 100%;
                align-items: center;
            }

            .user-info {
                flex-direction: column;
                width: 100%;
            }

            .info-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .btn-group {
                flex-direction: column;
            }

            .profile-avatar {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }

            .profile-name {
                font-size: 24px;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
                padding: 30px 20px;
            }

            .header-left {
                width: 100%;
                flex-wrap: wrap;
            }

            header h1 {
                font-size: 28px;
            }

            .btn-back {
                padding: 8px 12px;
                font-size: 12px;
            }

            .user-info {
                width: 100%;
                justify-content: space-between;
            }

            .username {
                font-size: 14px;
            }

            .btn-logout {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 20px 15px;
            }

            .header-left {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
                gap: 8px;
            }

            header h1 {
                font-size: 24px;
            }

            .btn-back {
                width: 100%;
                text-align: center;
            }

            .user-info {
                flex-direction: column;
                width: 100%;
                gap: 12px;
            }

            .btn-logout {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header with user info and logout -->
    <header>
        <div class="header-left">
            <a href="/" class="btn-back">← Back to Home</a>
            <h1>👤 Profile</h1>
        </div>
        <div class="user-info">
            <span class="username" th:if="${username}">
                <strong th:text="${username}"></strong>
            </span>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn-logout">🚪 Logout</button>
            </form>
        </div>
    </header>

    <div class="container">
        <!-- Profile Card -->
        <div class="profile-card">
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <div class="profile-name" th:text="${username}">John Doe</div>
                <div class="profile-role" sec:authorize="hasRole('ADMIN')">Administrator</div>
                <div class="profile-role" sec:authorize="hasRole('USER') and !hasRole('ADMIN')">Regular User</div>
            </div>

            <!-- Profile Body -->
            <div class="profile-body">
                <!-- Account Information -->
                <div class="profile-section">
                    <div class="section-title">Account Information</div>
                    <div class="info-row">
                        <span class="info-label">Username</span>
                        <span class="info-value" th:text="${username}">username</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Email</span>
                        <span class="info-value" th:text="${email} ?: 'Not provided'">user@example.com</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Account Status</span>
                        <span class="badge badge-success">Active</span>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Security Information -->
                <div class="profile-section">
                    <div class="section-title">Security</div>
                    <div class="info-row">
                        <span class="info-label">Password</span>
                        <span class="info-value">••••••••</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Two-Factor Authentication</span>
                        <span class="verification-status">
                            <span class="status-icon status-pending">✕</span>
                            <span>Disabled</span>
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Last Login</span>
                        <span class="info-value" th:text="${lastLogin} ?: 'Today'">Today at 10:30 AM</span>
                    </div>
                </div>

                <div class="divider"></div>

                <!-- Role Information -->
                <div class="profile-section">
                    <div class="section-title">Roles & Permissions</div>
                    <div class="info-row">
                        <span class="info-label">User Role</span>
                        <div>
                            <span class="badge" sec:authorize="hasRole('ADMIN')">ADMIN</span>
                            <span class="badge badge-success" sec:authorize="hasRole('USER') and !hasRole('ADMIN')">USER</span>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="alert('Edit Profile functionality coming soon!')">
                        ✏️ Edit Profile
                    </button>
                    <button class="btn btn-secondary" onclick="alert('Change Password functionality coming soon!')">
                        🔒 Change Password
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
